name: Debug Build for PR

on: [pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Check code formatting
      run: ./gradlew spotlessCheck --build-cache
    - name: Build debug
      run: ./gradlew assembleOssNoadsDebug --build-cache
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug.apk
        path: app/build/outputs/apk/ossNoads/debug/app-oss-noads-debug.apk
